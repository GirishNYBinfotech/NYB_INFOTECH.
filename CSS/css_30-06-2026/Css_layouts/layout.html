<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layouts</title>
    <link rel="stylesheet" href="./layouts.css">
    <style>
        
        #layout{
            box-sizing: border-box;
        }
        #layout1{
            display: flex;
            justify-content: space-around;
            flex-direction: row-reverse;
            margin: 20px;
        }
        #layout2{
            display: grid;
            background-color: blue;
        }
        .box{
            display: block;
            background-color: blueviolet;
            
        }
        /* .box1{
            display: none;
            background-color: brown;
        } */

        .box1{
            display: inline-block;
            background-color: brown;
        }

        /* static */
        #static{
            position: static;
        }
        /* relaative ostion */
        #relative{
            position: relative;
            top: 40px;
            left: 30px;
            border: 2px solid black;
            margin: 10px;
        }
        /* absolute */
        .parent{
            position:relative;
            width:200px;
            height:100px;
            border:2px solid black;
        }

        .child{
            position:absolute;
            top:20px;
            right:20px;
        }
        /* sticky postion */
        #sticky{
            position:sticky;
            bottom: 0;
            background:orange;
            width: 20%;
        } 
        /* fixed position */
        .chat{
            position:fixed;
            bottom:20px;
            right:20px;
        }
        /* float */
        #float1{
            float: right;
            width: 150px;
            margin-right: 15px;
        }
        .boxes{
            float: left;
            width: 100px;
            height: 100px;
            background: skyblue;
            margin: 10px;
            text-align: center;
            line-height: 100px;
        }
        /* clear */
        .boxes1{
            float: left;
            width: 100px;
            height: 100px;
            background: lightgreen;
            margin: 10px;
        }

.clear-text {
    clear: both;
}
    </style>
</head>
<body>
    <!-- layouts -->
     <div id="layout">
     <div id="layout1">
        <button>one</button>
        <h1>this is first</h1>
        <h1>this is second</h1>
     </div>
      <div id="layout2">
        <h1>this is first</h1>
        <h1>this is second</h1>
     </div>
     <div id="layout3">
        <h1 class="box">this is first</h1>
        <h1 class="box">this is second</h1>
     </div>
     <div id="layout3">
        <h1 class="box1">this is first</h1>
        <h1 class="box1">this is second</h1>
        <h1 class="box1">this is third</h1>
     </div>
     </div>
    <!-- positions -->
     <!-- static -->
     <div id="static">
        <h2>welcome</h2>
        <h2>hai</h2>
        <p>bye</p>
     </div>
     <!-- relative position -->
     <div id="relative">
        <h4>relative box</h4>
     </div>
     <!-- absolute -->
     <div class="parent">
        <h1>hello</h1>
     <div class="child">
        New
     </div>
     </div>
     <!-- sticky -->
      <h1 id="sticky">Navigation</h1>
     <!-- fixed position -->
     <div class="chat">
        Chat
     </div>
     <!-- float -->
     <p id="float1">This text wraps floated to the left.</p>
     <div class="boxes">Box 1</div>
     <div class="boxes">Box 2</div>
     <div class="boxes">Box 3</div>
     <br><br><br><br><br><br>
     <!-- clear -->
      
     <div class="boxes1">Box 1</div>
     <div class="boxes1">Box 2</div>
     <p class="clear-text">Lorem, ipsum dolor.</p>
</body>
</html>
