<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox and Grid Alignment</title>
<link rel="stylesheet" href="./alinments.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

section{
    margin-bottom:40px;
}

h2{
    margin-bottom:10px;
}

/* FLEXBOX */
.flexcontainer{
    height:300px;
    border:3px solid black;
    display:flex;
    flex-direction:row;         
    justify-content:space-evenly; 
    align-items:center;
    flex-wrap: wrap;
    gap:10px;
    background:white;
}
.flex-item{
    width:100px;
    height:100px;
    background:tomato;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
}

</style>

</head>
<body>

<h1>Flexbox and Grid Alignment Practice</h1>
<section>
    <h2>Flexbox Alignment</h2>

    <div class="flexcontainer">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
        <div class="flex-item">5</div>
    </div>
</section>

<section>
    <h2>Grid Alignment</h2>
    <div class="gridcontainer">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>
</section>

</body>
</html>
