<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=V, initial-scale=1.0">
    <title>Table tag</title>
</head>
<body>
    <!-- table tag -->
     <table border="5" cellpading="10">
        <caption>Details</caption>
        <tr>
            <th>name</th>
            <th>age</th>
        </tr>
        <tr>
            <td>king</td>
            <td>21</td>
        </tr>
        <tr>
            <td>girish</td>
            <td>24</td>
        </tr>
        <tr>
            <td>queen</td>
            <td>24</td>
        </tr>
        <!-- <tr>
            <td colspan="2">total age</td>
            <td>69</td>
        </tr> -->
        <tr>
            <td rowspan="2">total age</td>
            <td>69</td>
        </tr>
     </table>
     
</body>
</html>
