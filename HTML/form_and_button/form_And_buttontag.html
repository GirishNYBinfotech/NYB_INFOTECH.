<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form and button tags</title>
</head>
<body>
    <!-- form -->
      <form>
      <label > username:</label>
      <input type="email" type="number" placeholder="email/phone number" required></input>
      <br>
      <label>password:</label>
      <input type="password" min="1" maxlength="20" required>
      <select>
        <option>select a course</option>
        <option>HTMl</option>
        <option>css</option>
        <option>java script</option>
      </select>
      <br>

      <fieldset>
      <legend>Personal Info</legend>
      Name: <input type="text" required>
      </fieldset>

       <!-- buttons types -->
       <button type="reset">reset</button>
       <button type="submit">submit</button>
       <button type="button">button</button>
       <!-- button attributes -->
       <button name="clickhere">clickhere</button>
       <button autofocus>focus</button>
       <button disabled>disabled</button>
       <button value="send">value</button>
      </form>
      <br>

</body>
</html>
