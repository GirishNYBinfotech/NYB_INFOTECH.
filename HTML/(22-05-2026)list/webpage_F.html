<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>car registration</title>
    <link rel="shortcut icon" href="./india.png" type="image/x-icon">
</head>
<body>
    <header>
        <h2>welcome to car registration webpage</h2>
    </header>

    <section>
        <main>
            <form>
    <label>first name</label>
    <input type="text" required>
    <label>last name</label>
    <input type="text">
    <br>
    <label>email</label>
    <input type="email" placeholder="enter your email">
    <br>
    <label>mobile number</label>
    <input type="number" required>
    <br>
    <time>
    <label>date of birth</label>
    <input type="date" required>
    </time>
    <br>
    <label>Gender</label>
    <select >
        <option>Male</option>
        <option>Female</option>
    </select>
    <br>
    <label>color of car</label>
    <input type="color">
    <figure>
        <h5>photo of car</h5>
        <img src="./download.jpg" height="100" width="100">
    </figure>
    <hr>
    <label><strong>registration location</strong></label>
    <figure>
    <nav>
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d157936.89552058282!2d78.60342237913939!3d17.468689841927542!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1779427985886!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" height="100" width="100"></iframe>
    </nav>
    </figure>
    <br>
    <input type="radio" required>
    <label>terms & conditions</label>
    <br>
    <footer>
        <button type="reset">cancel</button>
        <button type="submit" autofocus>submit</button>
    </footer>
    </form>
    </main>
    </section>
</body>
</html>
