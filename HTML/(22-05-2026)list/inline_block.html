<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline & block elements</title>
</head>
<body>
    //inline Elements
    <br>
    <!-- inline Elements -->
     <a href="https://www.google.com/">google</a><br><img src="../../new_HTML/HTML/image.png"><br><label>name</label><input type="text">
     <p>hello<strong>world</strong><i>hai</i><u>fine</u><b>bold</b></p><br><hr>
     
     <!-- block level Elements -->
      <h1>hello world</h1>
      <h2>hello world</h2>
      <h3>hello world</h3>
      <header>
        <h4>hai</h4>
      </header>
      <section>
        <h5>hello world</h5>
      </section>
      <footer>
        <h6>hello world</h6>
      </footer>
      <nav>
        <a href="./ref.html"></a>
      </nav>
      <ol>
        <li>1</li>
        <li>2</li>
        <ul>
            <li>4</li>
            <li>5</li>
        </ul>
      </ol>

</body>
</html>
