<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

    <!-- form tag -->
     <p><strong>facebook login</strong></p>
     <form>
        <label>enter name</label>
        <input type="text" required placeholder="first letter with uppercase">
        <br>
        <label>mob.number</label>
        <input type="number" min="1" max="10">
        <br>
        <label>email</label>
        <input type="email"  placeholder="email" required>
        <br>
        <label>enter password</label>
        <input type="text" minlength="09" maxlength="15" required>
        <br>
        <label>re-enter password</label>
        <input  type="password" placeholder="enter same password"required>
        <br>
        <br>
        <label>Gender</label>
        <select>
            <option>select</option>
            <option>Male></option>
            <option>Female</option>
        </select>
        <br>
        <br>
        <label>date of birth</label>
        <input type="date">
        <br>
        <input type="checkbox" required> 
        <label>terms & conditions</label>
        <br>
        <!-- buttons -->
      <button type="reset">cancel/reset</button>
      <button type="submit" autofocus>submit</button>
     </form>

     <!-- list -->
        <ol><!--default 1234 -->
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
      </ol>
      <ol type="I">
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
      </ol>
      <ol type="A">
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
      </ol>
      <ol type="i">
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
      </ol>
      <ul><!--default-->
        <li>one</li>
        <li>two</li>
        <li>three</li>
      </ul>
      <ul type="circle">
        <li>one</li>
        <li>two</li>
        <li>three</li>
      </ul>
      <ul type="none">
        <li>one</li>
        <li>two</li>
        <li>three</li>
      </ul>
      <ul type="disc">
        <li>one</li>
        <li>two</li>
        <li>three</li>
      </ul>
</body>
</html>
