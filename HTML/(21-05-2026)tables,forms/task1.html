<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video & audio</title>
</head>
<body>
    <h3>Audio</h3>
    <audio controls>
        <source src="https://samplelib.com/mp3/sample-3s.mp3">

    </video>
</body>
</html>
