<!DOCTYPE html>
<html>
<head>
    <title>Layout Alignment Practice</title>
    <link rel="shortcut icon" href="./image.png" type="image/x-icon">
</head>

<body>
    <header align="center">
        <h1>My Webpage</h1>
        <p>Practice of formatting and alignment</p>
    </header>
    <hr>
    <nav align="center">
        <a href="">Home</a> \
        <a href="">About</a> \
        <a href="">Contact</a>.
    </nav>
    <hr>
    <section>
        <div align="left">
            <h2>Left Aligned Text</h2>
            <p>This is aligned to the left.</p>
        </div>
        <div align="center">
            <p><strong>Center Aligned Text</strong></p>
            <p>This is aligned to the center.</p>
        </div>
        <div align="right">
            <h2>Right Aligned Text</h2>
            <p>This is aligned to the right.</p>
        </div>
    </section>
    <hr>
    <table border="1" width="50%">
        <tr>
            <th align="center">1</th>
            <th align="center">2</th>
            <th align="center">3</th>
        </tr>
        <tr>
            <td>HTML</td>
            <td>CSS</td>
            <td>JavaScript</td>
        </tr>
    </table>
    <hr>
    <footer align="center">
        <p>&copy; Copyright 2026</p>
    </footer>
</body>
</html>
